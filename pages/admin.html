<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalonHub Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h2 style="color: white">SalonHub Admin</h2>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>
    <main>
      <section>
        <div class="login-box">
          <h2>Admin Login</h2>

          <input
            type="text"
            id="adminUser"
            placeholder="Enter Admin Username"
          />
          <input
            type="password"
            id="adminPass"
            placeholder="Enter Admin Password"
          />

          <button onclick="adminLogin()">Login</button>
        </div>
      </section>

      <h1 style="text-align: center; margin-top: 20px">All Bookings</h1>

      <table id="bookingTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Shop</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Worker</th>
            <th>Date</th>
            <th>Time</th>
            <th>Price (₹)</th>
            <th>Notes</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <h2 style="text-align: center; margin-top: 20px">User Messages</h2>

      <table id="messageTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Service</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
